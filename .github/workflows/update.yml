concurrency:
  group: library-monitor
  cancel-in-progress: true

name: update

on:
  schedule:
    - cron: "5 23 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npx playwright install chromium

      - run: node fetch.js

      - name: commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add books.json new_books.json
          git diff --cached --quiet || git commit -m "update books"
          git push
- uses: actions/upload-artifact@v4
  if: always()
  with:
    name: debug
    path: |
      debug.png
      books.json
      new_books.json
